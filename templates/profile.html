<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoAlert | Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/dashboard">📍 GeoAlert</a>
        <div class="navbar-nav ms-auto flex-row gap-3">
            <a class="nav-link" href="/dashboard">Dashboard</a>
            <a class="nav-link" href="/map">Map</a>
            <a class="nav-link" href="/notifications">Notifications</a>
            <a class="nav-link active" href="/profile">Profile</a>
        </div>
    </div>
</nav>

<div class="container mt-5 mb-5 animate-fade-up">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card p-4 shadow-sm">
                
                <div class="text-center pb-4 border-bottom mb-4">
                    <div class="d-inline-flex align-items-center justify-content-center bg-light border text-primary rounded-circle mb-3" style="width: 80px; height: 80px; font-size: 2rem; font-weight: 600;">
                        👤
                    </div>
                    <h3 class="fw-bold text-text mb-1">User Profile</h3>
                    <p class="text-secondary small mb-0">Registered Identity Parameters Framework Node</p>
                </div>

                <form onsubmit="event.preventDefault();">
                    <div class="row g-3">
                        <div class="col-md-12">
                            <label class="form-label text-text fw-medium small mb-1">Full Name</label>
                            <input type="text" id="profileName" class="form-control" readonly>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-text fw-medium small mb-1">Email Address</label>
                            <input type="email" id="profileEmail" class="form-control" readonly>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-text fw-medium small mb-1">Phone</label>
                            <input type="text" id="profilePhone" class="form-control" readonly>
                        </div>
                        <div class="col-md-12">
                            <label class="form-label text-text fw-medium small mb-1">Notification Preference</label>
                            <select id="profilePreference" class="form-select">
                                <option value="All">All Notifications</option>
                                <option value="Offers">Nearby Offers</option>
                                <option value="Traffic">Traffic Updates</option>
                                <option value="Emergency">Emergency Alerts</option>
                            </select>
                        </div>
                    </div>
                </form>

                <div class="d-flex flex-column flex-sm-row gap-3 mt-4 pt-3 border-top justify-content-between align-items-stretch align-items-sm-center">
                    <div class="text-secondary small">
                        <span>Registration Membership:</span> <span class="fw-medium font-monospace text-text">Standard Student Node</span>
                    </div>
                    <button class="btn btn-warning" onclick="logout()">
                        Logout
                    </button>
                </div>

            </div>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
