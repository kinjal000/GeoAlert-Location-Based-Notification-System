<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoAlert | Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-xl-10 col-lg-11">
            <div class="auth-split-container row g-0 animate-fade-up">
                
                <div class="col-md-6 auth-graphic-side">
                    <div class="auth-graphic-pattern"></div>
                    <div>
                        <span style="font-size: 2rem;">📍</span>
                        <h2 class="fw-bold mt-3 text-white">GeoAlert</h2>
                        <p class="text-white-50 small">Location-Based Notification Infrastructure</p>
                    </div>
                    <div>
                        <p class="text-white-50 small mb-0">Ready to simulate custom location history tracks? Initialize user nodes records cleanly inside secure framework architectures.</p>
                    </div>
                </div>

                <div class="col-md-6 auth-form-side" style="padding: 2.5rem 3rem;">
                    <div class="mb-3">
                        <h3 class="fw-bold text-text mb-1">Create Account</h3>
                        <p class="text-secondary small">Register unique system tracking attributes credentials cleanly.</p>
                    </div>

                    <form id="registerForm">
                        <div class="mb-2">
                            <label class="form-label text-text fw-medium small mb-1">Full Name</label>
                            <input type="text" class="form-control" id="name" placeholder="John Doe" required>
                        </div>
                        <div class="mb-2">
                            <label class="form-label text-text fw-medium small mb-1">Email</label>
                            <input type="email" class="form-control" id="email" placeholder="john@example.com" required>
                        </div>
                        <div class="mb-2">
                            <label class="form-label text-text fw-medium small mb-1">Phone Number</label>
                            <input type="text" class="form-control" id="phone" placeholder="+91 9876543210" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-text fw-medium small mb-1">Password</label>
                            <input type="password" class="form-control" id="password" placeholder="Min. 8 characters" required>
                            <div class="password-indicator-track">
                                <div class="password-indicator-bar"></div>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-success w-100 mb-3">
                            Register
                        </button>
                    </form>

                    <div class="text-center">
                        <p class="text-secondary small mb-0">
                            Already have an account? 
                            <a href="/" class="text-primary fw-medium text-decoration-none">Login</a>
                        </p>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
